[project]
name = "tcg"
version = "0.1.0"
description = "TCGplayer price scraper for Grand Archive and other TCG card pools"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "curl-cffi>=0.15.0",
    "polars>=1.0.0",
    "duckdb>=1.0.0",
]

[dependency-groups]
dev = [
    "pytest>=8.0.0",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
